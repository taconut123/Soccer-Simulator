<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href = 'https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <title>Soccer</title>
    <style>
        html, body {
            background-color: #000505;
            margin: 7px;
            font-family: 'Roboto', sans-serif;
        }
        button {
            font-size: xx-small;
            width: fit-content;
            height: 20px;
            background-color: #FFFFFF;
            border-radius: 10px;
        }
        
        
        .container {
            display: flex;
            background-color: #F15025;
            width: 100%;
            height: 97vh;
        }
        .strength-container {
            background-color: #e6e8e6;
            margin-top: 1%;
            margin-left: 1%;
            margin-bottom: 10px;
            width: 500px;
            height: calc(95%-10px);
            border: solid #191919 5px;
            text-align: center;
        }
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
        }
        .strength-text {
            margin-top: -10px;
        }
        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input {
            width: 30px;            
        }
        #strength-title {
            margin-bottom: 1px;
            margin-top: -2px;
        }
        .group-a-team-container{
            display: grid;
            grid-template-columns: repeat(4,125px);        
        }

        .group-b-team-container{
            display: grid;
            grid-template-columns: repeat(4,125px);
            border-top: 10px solid #191919;
        }

        .team-card {
            border: 1px solid #191919;
            width: 125px;
            height: 112px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        .strength {
            margin-top: -10px;
        }
        .strength-update {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .delgation-buttons{
            margin-top: auto;
            padding-bottom: 0.1px;
            display: grid;
            grid-template-columns: auto auto;
            text-align: center;
            justify-content: center;
            margin-bottom: 2px;
        }
        .delgation{
            background-color: lightgreen;    
            width: fit-content;
            height: auto;
            display: flex;
        }

        .main-content {
            background-color: #ced0ce;
            margin-top: 1%;
            margin-bottom: 10px;
            height: calc(95%-10px);
            min-width: fit-content;
            flex: 1;
            overflow-y: auto;
            margin-left: 10px;
            margin-right: 10px;
            display: block;
            min-width: 0;
            border: solid #191919 5px;
            display: flex;
            flex-direction: column;
        }
        #match-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            gap: 20px;
        }
        #match-display span {
            font-size: 55px;
        }
        #team-1-container {
            display:flex; 
            justify-content: flex-start;
            align-items: center;
        }
        #team-2-container {
            display:flex; 
            justify-content: flex-end;
            align-items: center;
        }
        #VS {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #team-selection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
            gap: 20px;
        }
        #team_1_selection {
            display: grid;
            grid-template-columns: auto auto auto auto auto;
        }
        #team_1_selection button {
            height: 75px;
            width: 80px;
            font-size: small;
        }
        #team_2_selection {
            display: grid;
            grid-template-columns: auto auto auto auto auto;
        }
        #team_2_selection button {
            height: 75px;
            width: 80px;
            font-size: small
        }
        #simulate-match {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20%;
        }
        #simulate-match button{
            height: auto;
            width: 300px;
            font-size: xx-large;
        }

        
        
    </style>
</head>
<body>
    <div class="container">
        <aside class="strength-container">
            <h1 id="strength-title">Strengths</h1>
            <div class="group-a-team-container" id="group-A-team-container"></div>
            <div class="group-b-team-container" id="group-B-team-container"></div>
        </aside>

        <main class="main-content">
            <div id="match-display">
                <div id="team-1-container"><span id="team_1"></span><span>'s Score:</span><p> </p><span id="team_1_score">0</span></div>
                <div id="VS"><p>VS</p></div>
                <div id="team-2-container"><span id="team_2"></span><span>'s Score:</span><span id="team_2_score">0</span></div>
            </div>
            <div id="team-selection">
                <div id="team_1_selection"></div>
                <div id="team_2_selection"></div> 
            </div>
            <div id="simulate-match"><button onclick="simulateMatch()">Simulate Match</button></div>
        </main>
    </div>
</body>
<script>
    let team_1 = null
    let team_2 = null
    let teams = {
        // Group A
        'Los_Angeles_Angels': { name: 'Los Angeles Angels', strength: 66, group: 'A' },
        'Chicago_Grizzlies': { name: 'Chicago Grizzlies', strength: 30, group: 'A' },
        'Houston_Hungovers': { name: 'Houston Hungovers', strength: 97, group: 'A' },
        'Phoenix_Phantoms': { name: 'Phoenix Phantoms', strength: 97, group: 'A' },
        'Philadelphia_Photos': { name: 'Philadelphia Photos', strength: 76, group: 'A' },
        'San_Antonio_Sprouts': { name: 'San Antonio Sprouts', strength: 52, group: 'A' },
        'San_Diego_Zoogoers': { name: 'San Diego Zoogoers', strength: 30, group: 'A' },
        'Dallas_Darts': { name: 'Dallas Darts', strength: 30, group: 'A' },
        'Jacksonville_Jags': { name: 'Jacksonville Jags', strength: 79, group: 'A' },
        'San_Jose_Strikers': { name: 'San Jose Strikers', strength: 72, group: 'A' },
        'Charlotte_Cows': { name: 'Charlotte Cows', strength: 92, group: 'A' },
        'Columbus_Cant': { name: 'Columbus Cant', strength: 90, group: 'A' },
        'Indianapolis_Indy': { name: 'Indianapolis Indy', strength: 79, group: 'A' },
        'San_Francisco_86ers': { name: 'San Francisco 86ers', strength: 86, group: 'A' },
        'Seattle_Seals': { name: 'Seattle Seals', strength: 92, group: 'A' },
        'Denver_Soccer_Team': { name: 'Denver Soccer Team', strength: 90, group: 'A' },
        // Group B
        'Nashville_Nights': { name: 'Nashville Nights', strength: 30, group: 'B' },
        'Oklahoma_City_Naders': { name: 'Oklahoma City Naders', strength: 7, group: 'B' },
        'Washington_Washers': { name: 'Washington Washers', strength: 24, group: 'B' },
        'Las_Vegas_Gamblers': { name: 'Las Vegas Gamblers', strength: 38, group: 'B' },
        'Boston_Hearts': { name: 'Boston Hearts', strength: 27, group: 'B' },
        'Detroit_Dryers': { name: 'Detroit Dryers', strength: 39, group: 'B' },
        'Louisville_Cardinals': { name: 'Louisville Cardinals', strength: 11, group: 'B' },
        'Baltimore_Poets': { name: 'Baltimore Poets', strength: 21, group: 'B' },
        'Kansas_City_Winners': { name: 'Kansas City Winners', strength: 28, group: 'B' }
    };
    const converison = {
    'LAA': { name: 'Los_Angeles_Angels'},
    'CHI': { name: 'Chicago_Grizzlies'},
    'HOU': { name: 'Houston_Hungovers'},
    'PHX': { name: 'Phoenix_Phantoms'},
    'PHI': { name: 'Philadelphia_Photos'},
    'SAS': { name: 'San_Antonio_Sprouts'},
    'SDZ': { name: 'San_Diego_Zoogoers'},
    'DAL': { name: 'Dallas_Darts'},
    'JAX': { name: 'Jacksonville_Jags'},
    'SJS': { name: 'San_Jose_Strikers'},
    'CHA': { name: 'Charlotte_Cows'},
    'COL': { name: 'Columbus_Cant'},
    'IND': { name: 'Indianapolis_Indy'},
    'SFE': { name: 'San_Francisco_86ers'},
    'SEA': { name: 'Seattle_Seals'},
    'DEN': { name: 'Denver_Soccer_Team'},
    'NSH': { name: 'Nashville_Nights'},
    'OKC': { name: 'Oklahoma_City_Naders'},
    'WAS': { name: 'Washington_Washers'},
    'LVG': { name: 'Las_Vegas_Gamblers'},
    'BOS': { name: 'Boston_Hearts'},
    'DET': { name: 'Detroit_Dryers'},
    'LOU': { name: 'Louisville_Cardinals'},
    'BAL': { name: 'Baltimore_Poets'},
    'KCW': { name: 'Kansas_City_Winners'},
    'Los_Angeles_Angels': { name: 'LAA'},
    'Chicago_Grizzlies': { name: 'CHI'},
    'Houston_Hungovers': { name: 'HOU'},
    'Phoenix_Phantoms': { name: 'PHX'},
    'Philadelphia_Photos': { name: 'PHI'},
    'San_Antonio_Sprouts': { name: 'SAS'},
    'San_Diego_Zoogoers': { name: 'SDZ'},
    'Dallas_Darts': { name: 'DAL'},
    'Jacksonville_Jags': { name: 'JAX'},
    'San_Jose_Strikers': { name: 'SJS'},
    'Charlotte_Cows': { name: 'CHA'},
    'Columbus_Cant': { name: 'COL'},
    'Indianapolis_Indy': { name: 'IND'},
    'San_Francisco_86ers': { name: 'SFE'},
    'Seattle_Seals': { name: 'SEA'},
    'Denver_Soccer_Team': { name: 'DEN'},
    'Nashville_Nights': { name: 'NSH'},
    'Oklahoma_City_Naders': { name: 'OKC'},
    'Washington_Washers': { name: 'WAS'},
    'Las_Vegas_Gamblers': { name: 'LVG'},
    'Boston_Hearts': { name: 'BOS'},
    'Detroit_Dryers': { name: 'DET'},
    'Louisville_Cardinals': { name: 'LOU'},
    'Baltimore_Poets': { name: 'BAL'},
    'Kansas_City_Winners': { name: 'KCW'}
};

    function saveProgress(){
        localStorage.setItem("teams",JSON.stringify(teams));
    }
    function loadProgress(){
        if(localStorage.getItem("teams") !== null){
            teams = JSON.parse(localStorage.getItem("teams"));
        }
    }
    function createTeamCards(){
        for(const team in teams){
            const team_div = document.createElement('div')
            team_div.id = team
            team_div.className = 'team-card'
            team_div.innerHTML = `<p>${teams[team].name}:</p> <p id="${team}_strength" class="strength-text">${teams[team].strength}</p>`
            const strength_div = document.createElement('div')
            strength_div.className = 'strength'
            strength_div.innerHTML = `<p class="strength-update">
                <input type = 'number' id='${team}_strength_change' name = '${team}_strength_change' value = '0' step = '1' autocomplete="off">
                <button onclick="updateStrength('${team}','${team}_strength_change')">Update Strength</button>
            </p>`
            const delgation_buttons_div = document.createElement('div')
            delgation_buttons_div.className = 'delgation-buttons'
            delgation_buttons_div.innerHTML = `<button class="delgation" onclick="promotion('${team}')">Promote</button>
            <button class="delgation" onclick="demotion('${team}')">demote</button>`
            team_div.append(strength_div)
            team_div.append(delgation_buttons_div)
            if(teams[team].group === 'A'){
                document.getElementById('group-A-team-container').append(team_div)
            } else if(teams[team].group === 'B'){
                document.getElementById('group-B-team-container').append(team_div)
            }
        }
    }
    function createSelectionButtons(){
        for(const team in teams){
            const team_button = document.createElement('button')
            team_button.onclick = function(){
                selectTeam1(team)
            }
            team_button.innerText = teams[team].name
            document.getElementById('team_1_selection').append(team_button)
        }
        for(const team in teams){
            const team_button = document.createElement('button')
            team_button.onclick = function(){
                selectTeam2(team)
            }
            team_button.innerText = teams[team].name
            document.getElementById('team_2_selection').append(team_button)
        }
    }
    function updateStrength(teamCode,id) {
        const strengthChange = parseFloat(document.getElementById(id).value)
        
        if(0 < teams[teamCode].strength < 100){
            teams[teamCode].strength = Math.min(100,Math.max(0,teams[teamCode].strength + strengthChange)) ;
            document.getElementById(`${teamCode}_strength`).textContent = teams[teamCode].strength;
            saveProgress()
        }
    }
    function promotion(team){
        console.log(teams[team].group)
        if(teams[team].group === 'A'){
            return
        }
        teams[team].group = 'A'
        console.log(teams[team].group)
        const currentDiv = document.getElementById(team)
        const newParent = document.getElementById('group-A-team-container')
        newParent.append(currentDiv)
        saveProgress()
    }
    function demotion(team){
        console.log(teams[team].group)
        if(teams[team].group === 'B'){
            return
        }
        teams[team].group = 'B'
        console.log(teams[team].group)
        const currentDiv = document.getElementById(team)
        const newParent = document.getElementById('group-B-team-container')
        newParent.append(currentDiv)
        saveProgress()
    }
    function selectTeam1(team) {
        team_1 = team
        document.getElementById("team_1").innerText = converison[team_1].name
        document.getElementById("team_1_score").innerText = '0'
    }
    function selectTeam2(team) {
        team_2 = team
        document.getElementById("team_2").innerText = converison[team_2].name
        document.getElementById("team_2_score").innerText = '0'
    }
    function simScore(strength,attempts=20){
        const chance = strength/800;
        let goals = 0;
        for(let i = 0; i < attempts; i++){
            if(Math.random() < chance){
                goals++;
            }
        }
        return goals;
    }
    function simulateMatch() {
        if(!(team_1 in teams)){
            team_1 = converison[team_1].name
        }
        if(!(team_2 in teams)){
            team_2 = converison[team_2].name
        }
        let team_1_strength = teams[team_1].strength
        let team_2_strength = teams[team_2].strength
        // const total_strength = team_1_strength + team_2_strength
        // const team_1_ratio = team_1_strength /total_strength

        // const totalGoals = Math.floor(Math.random() * 9)
        // const team_1_score = Math.floor(totalGoals*team_1_ratio) 
        // const team_2_score = totalGoals - team_1_score
        const team_1_score = simScore(team_1_strength);
        const team_2_score = simScore(team_2_strength);
        document.getElementById("team_1_score").innerText = team_1_score
        document.getElementById("team_2_score").innerText = team_2_score
    }
    loadProgress()
    createTeamCards()
    createSelectionButtons()
</script>
</html>
